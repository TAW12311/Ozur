<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ebru'dan Özür</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #fff7f8, #ffe8ee);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
    }

    h1 {
      color: #e84d7f;
      font-size: 28px;
      margin: 0 0 10px;
    }

    .subtitle {
      color: #555;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 18px;
      padding: 0 8px;
    }

    .image-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .image-wrap img {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
    }

    .message {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      color: #4b4b4b;
      font-size: 17px;
      line-height: 1.7;
      font-weight: 600;
    }

    .buttons-area {
      width: 100%;
      max-width: 360px;
      height: 170px;
      margin: 8px auto 0;
      position: relative;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.97);
    }

    #yesBtn {
      background: #e84d7f;
      color: white;
      box-shadow: 0 8px 20px rgba(232, 77, 127, 0.28);
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 240px;
      max-width: 90%;
    }

    #noBtn {
      background: #f1f1f1;
      color: #444;
      position: absolute;
      top: 12px;
      left: 18px;
      min-width: 90px;
    }

    .result {
      min-height: 30px;
      margin-top: 16px;
      color: #e84d7f;
      font-size: 20px;
      font-weight: bold;
    }

    .heart {
      position: fixed;
      font-size: 22px;
      pointer-events: none;
      animation: floatUp 2.4s linear forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-180px) scale(1.4);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
      }

      .message {
        font-size: 16px;
        min-height: 100px;
      }

      .buttons-area {
        height: 180px;
      }

      #yesBtn {
        width: 220px;
        font-size: 14px;
      }

      #noBtn {
        font-size: 14px;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Ebru, Özür Dilerim</h1>

    <p class="subtitle">
      Seni çok kırdım bunun farkındayım. Gerçekten çok üzgünüm ve bunu telafi etmek istiyorum. Seninle olmak istiyorum.
    </p>

    <div class="image-wrap">
      <img src="ebru.png" alt="Ebru için özür görseli">
    </div>

    <div class="message" id="message">
      Gerçekten özür dilerim. Seni kırmak hiç istemezdim.
    </div>

    <div class="buttons-area" id="buttonsArea">
      <button id="noBtn">Affetmedim</button>
      <button id="yesBtn">Affettim</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const result = document.getElementById("result");
    const buttonsArea = document.getElementById("buttonsArea");

    let clickCount = 0;

    const messages = [
      "Gerçekten özür dilerim. Seni üzmek hiç istemezdim.",
      "Yaptığım şeyin seni ne kadar üzdüğünü biliyorum ve bunun için gerçekten çok pişmanım.",
      "Sen benim için çok değerlisin Ebruşum.",
      "Aramızın böyle olmasını istemiyorum, hep güzel olalım istiyorum.",
      "Yaptığım hatayı son kez telafi etmek istiyorum.",
      "Bir şans daha verirsen gerçekten daha dikkatli olacağım ve bazı şeyler değişecek, seni çok seviyorum.",
      "Seni üzmek istememiştim,sni çok seviyorum.",
      "Benim için çok değerlisin.",
      "Sadece bir kez daha düşünmeni istiyorum.",
      "Gerçekten kalpten özür diliyorum."
    ];

    function moveNoButton() {
      const areaWidth = buttonsArea.clientWidth;
      const areaHeight = buttonsArea.clientHeight;

      const btnWidth = noBtn.offsetWidth;
      const btnHeight = noBtn.offsetHeight;

      const maxX = areaWidth - btnWidth;
      const maxY = areaHeight - btnHeight;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("click", function () {
      clickCount++;

      const index = Math.min(clickCount, messages.length - 1);
      message.textContent = messages[index];

      moveNoButton();

      const scale = 1 + clickCount * 0.07;
      yesBtn.style.transform = `translateX(-50%) scale(${scale})`;

      if (clickCount >= 2) {
        yesBtn.textContent = "Lütfen Affet ";
      }
      if (clickCount >= 5) {
        yesBtn.textContent = "Bir Şans Daha Ver";
      }
      if (clickCount >= 8) {
        yesBtn.textContent = "Aşkım Nolursun Lütfen Affet";
      }
    });

    noBtn.addEventListener("touchstart", function () {
      moveNoButton();
    });

    yesBtn.addEventListener("click", function () {
      message.textContent = "Teşekkür ederim. Bunu düzeltmek için elimden geleni yapacağım.";
      result.textContent = "❤️";
      noBtn.style.display = "none";
      yesBtn.textContent = "Teşekkür ederim";
      yesBtn.style.transform = "translateX(-50%) scale(1.05)";

      for (let i = 0; i < 12; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = ["❤️", "💖", "💕", "💗"][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = (window.innerHeight - 60) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 2400);
      }
    });
  </script>

</body>
</html>
